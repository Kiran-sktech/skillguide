<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillGuide</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    #sidebar {
      width: 260px;
      background: #111827;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 8px;
      border-right: 1px solid #ffffff0f;
      flex-shrink: 0;
    }

    #sidebar h2 {
      font-size: 15px;
      font-weight: 600;
      color: #e2e8f0;
      padding: 8px 10px;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #sidebar h2 span {
      width: 8px; height: 8px;
      background: #7c3aed;
      border-radius: 50%;
      box-shadow: 0 0 6px #7c3aed;
      display: inline-block;
    }

    #new-chat-btn {
      background: #1e293b;
      border: 1px solid #ffffff15;
      color: #e2e8f0;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
      width: 100%;
      text-align: left;
    }

    #new-chat-btn:hover { background: #2d3748; }

    .chat-history-label {
      font-size: 10px;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 10px 4px;
    }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #chat-list::-webkit-scrollbar { width: 3px; }
    #chat-list::-webkit-scrollbar-thumb { background: #ffffff15; border-radius: 2px; }

    .chat-item {
      padding: 9px 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: #9ca3af;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-item:hover { background: #1e293b; color: #e2e8f0; }
    .chat-item.active { background: #1e293b; color: #e2e8f0; border-left: 2px solid #7c3aed; }
    .chat-item::before { content: '💬'; font-size: 12px; }

    #sidebar-footer {
      border-top: 1px solid #ffffff0f;
      padding-top: 12px;
      font-size: 11px;
      color: #4b5563;
      text-align: center;
    }

    /* MAIN AREA */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 16px 24px;
      border-bottom: 1px solid #ffffff0f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111827;
      flex-shrink: 0;
    }

    #header h3 {
      font-size: 14px;
      color: #9ca3af;
      font-weight: 400;
    }

    #header .model-badge {
      background: #7c3aed22;
      color: #a78bfa;
      border: 1px solid #7c3aed44;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: #ffffff0f; border-radius: 2px; }

    .message-row {
      padding: 16px 24px;
      display: flex;
      gap: 16px;
      animation: fadeUp 0.25s ease;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.bot { background: #7c3aed; color: #fff; }
    .avatar.user { background: #1e293b; color: #a78bfa; border: 1px solid #7c3aed44; }

    .bubble {
      max-width: 85%;
      font-size: 14px;
      line-height: 1.75;
      color: #e2e8f0;
      padding-top: 4px;
    }

    .message-row.user .bubble {
      background: #1e293b;
      padding: 12px 16px;
      border-radius: 12px 4px 12px 12px;
      color: #e2e8f0;
      border: 1px solid #ffffff0f;
    }

    .bubble h1, .bubble h2, .bubble h3 {
      margin: 12px 0 6px;
      color: #f1f5f9;
      font-size: 15px;
    }

    .bubble p { margin-bottom: 8px; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .bubble li { margin-bottom: 4px; }

    .bubble code {
      background: #1e293b;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #a78bfa;
    }

    .bubble pre {
      background: #0f172a;
      border: 1px solid #ffffff0f;
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .bubble pre code {
      background: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 13px;
    }

    .bubble strong { color: #f1f5f9; }

    /* WELCOME SCREEN */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #4b5563;
      padding: 40px;
    }

    #welcome h2 {
      font-size: 24px;
      color: #e2e8f0;
      font-weight: 600;
    }

    #welcome p {
      font-size: 14px;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      background: #1e293b;
      border: 1px solid #ffffff0f;
      color: #9ca3af;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Segoe UI', sans-serif;
    }

    .chip:hover { background: #2d3748; color: #e2e8f0; border-color: #7c3aed44; }

    /* THINKING */
    .thinking {
      display: flex;
      gap: 5px;
      padding: 8px 0;
      align-items: center;
    }

    .thinking span {
      width: 7px; height: 7px;
      background: #7c3aed;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.5;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* INPUT AREA */
    #input-wrapper {
      padding: 16px 24px 24px;
      background: #0f0f1a;
      flex-shrink: 0;
    }

    #input-area {
      max-width: 820px;
      margin: 0 auto;
      background: #1e293b;
      border: 1px solid #ffffff15;
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      padding: 12px 14px;
      gap: 10px;
      transition: border-color 0.2s;
    }

    #input-area:focus-within { border-color: #7c3aed55; }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Segoe UI', sans-serif;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
    }

    #input::placeholder { color: #4b5563; }

    #send-btn {
      width: 34px; height: 34px;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #send-btn:hover { background: #6d28d9; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn svg { width: 16px; height: 16px; fill: #fff; }

    #input-hint {
      text-align: center;
      font-size: 11px;
      color: #374151;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h2><span></span> SkillGuide</h2>
    <button id="new-chat-btn" onclick="newChat()">✏️ New Chat</button>
    <div class="chat-history-label">Recent</div>
    <div id="chat-list"></div>
    <div id="sidebar-footer">Powered by Groq AI</div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="header">
      <h3 id="chat-title">Start a new conversation</h3>
      <div class="model-badge">⚡ Groq · Fast</div>
    </div>

    <div id="chat-box">
      <div id="welcome">
        <h2>👋 Hey there, learner!</h2>
        <p>I'm SkillGuide — your AI mentor. Ask me anything you want to learn and I'll guide you step by step.</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="sendChip('How do I start learning JavaScript?')">JavaScript basics</button>
          <button class="chip" onclick="sendChip('Explain DSA in simple terms')">DSA explained</button>
          <button class="chip" onclick="sendChip('How does React work?')">How React works</button>
          <button class="chip" onclick="sendChip('What is an API?')">What is an API?</button>
        </div>
      </div>
    </div>

    <div id="input-wrapper">
      <div id="input-area">
        <textarea id="input" rows="1" placeholder="Ask anything you want to learn..."></textarea>
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div id="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box')
    const input = document.getElementById('input')
    const chatList = document.getElementById('chat-list')
    const chatTitle = document.getElementById('chat-title')
    const welcome = document.getElementById('welcome')

    let chats = []
    let currentChatId = null
    let messageHistory = []

    function generateId() {
      return Date.now().toString()
    }

    function newChat() {
      const id = generateId()
      const chat = { id, title: 'New Chat', messages: [] }
      chats.unshift(chat)
      currentChatId = id
      messageHistory = []
      renderSidebar()
      renderMessages([])
      chatTitle.textContent = 'New conversation'
      input.focus()
    }

    function switchChat(id) {
      const chat = chats.find(c => c.id === id)
      if (!chat) return
      currentChatId = id
      messageHistory = chat.messages.map(m => ({ role: m.role, content: m.content }))
      renderSidebar()
      renderMessages(chat.messages)
      chatTitle.textContent = chat.title
    }

    function renderSidebar() {
      chatList.innerHTML = ''
      chats.forEach(chat => {
        const div = document.createElement('div')
        div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '')
        div.textContent = chat.title
        div.onclick = () => switchChat(chat.id)
        chatList.appendChild(div)
      })
    }

    function renderMessages(messages) {
      chatBox.innerHTML = ''
      if (messages.length === 0) {
        chatBox.innerHTML = `<div id="welcome">
          <h2>👋 Hey there, learner!</h2>
          <p>I'm SkillGuide — your AI mentor. Ask me anything you want to learn and I'll guide you step by step.</p>
          <div class="suggestion-chips">
            <button class="chip" onclick="sendChip('How do I start learning JavaScript?')">JavaScript basics</button>
            <button class="chip" onclick="sendChip('Explain DSA in simple terms')">DSA explained</button>
            <button class="chip" onclick="sendChip('How does React work?')">How React works</button>
            <button class="chip" onclick="sendChip('What is an API?')">What is an API?</button>
          </div>
        </div>`
        return
      }
      messages.forEach(m => addMessageToDOM(m.role, m.content))
    }

    function addMessageToDOM(role, content) {
      const row = document.createElement('div')
      row.className = `message-row ${role}`

      const avatar = document.createElement('div')
      avatar.className = `avatar ${role}`
      avatar.textContent = role === 'bot' ? 'S' : 'Y'

      const bubble = document.createElement('div')
      bubble.className = 'bubble'

      if (role === 'bot') {
        bubble.innerHTML = marked.parse(content)
      } else {
        bubble.textContent = content
      }

      row.appendChild(avatar)
      row.appendChild(bubble)
      chatBox.appendChild(row)
      chatBox.scrollTop = chatBox.scrollHeight
    }

    function addThinking() {
      const row = document.createElement('div')
      row.className = 'message-row bot'
      row.id = 'thinking-row'
      row.innerHTML = `
        <div class="avatar bot">S</div>
        <div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>
      `
      chatBox.appendChild(row)
      chatBox.scrollTop = chatBox.scrollHeight
    }

    async function sendMessage(overrideText) {
      const message = overrideText || input.value.trim()
      if (!message) return

      // Create new chat if none exists
      if (!currentChatId) newChat()

      // Hide welcome
      const w = document.getElementById('welcome')
      if (w) w.remove()

      input.value = ''
      input.style.height = 'auto'

      // Add user message
      addMessageToDOM('user', message)
      messageHistory.push({ role: 'user', content: message })

      // Update chat title from first message
      const chat = chats.find(c => c.id === currentChatId)
      if (chat) {
        if (chat.title === 'New Chat') {
          chat.title = message.slice(0, 30) + (message.length > 30 ? '...' : '')
          chatTitle.textContent = chat.title
          renderSidebar()
        }
        chat.messages.push({ role: 'user', content: message })
      }

      addThinking()

      try {
        const response = await fetch('http://localhost:3000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: messageHistory })
        })

        const data = await response.json()
        document.getElementById('thinking-row')?.remove()

        const reply = data.reply
        messageHistory.push({ role: 'assistant', content: reply })
        if (chat) chat.messages.push({ role: 'bot', content: reply })

        addMessageToDOM('bot', reply)

      } catch (err) {
        document.getElementById('thinking-row')?.remove()
        addMessageToDOM('bot', 'Something went wrong. Is your server running?')
      }
    }

    function sendChip(text) {
      sendMessage(text)
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        sendMessage()
      }
    })

    input.addEventListener('input', () => {
      input.style.height = 'auto'
      input.style.height = Math.min(input.scrollHeight, 120) + 'px'
    })

    // Start with a new chat
    newChat()
  </script>

</body>
</html>
